name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger release on version tags (e.g., v1.0.0)
  workflow_dispatch: # Allow manual triggering

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Go 1.21
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          
      - name: Install Dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev

      - name: Download Go Modules
        run: go mod tidy

      - name: Build Binary (Windows)
        if: matrix.os == 'windows-latest'
        # -H windowsgui hides the background console on Windows
        run: go build -ldflags="-s -w -H windowsgui" -o cf-v2-windows-amd64.exe .

      - name: Build Binary (macOS)
        if: matrix.os == 'macos-latest'
        run: go build -ldflags="-s -w" -o cf-v2-darwin-amd64 .

      - name: Build Binary (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: go build -ldflags="-s -w" -o cf-v2-linux-amd64 .

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os }}
          path: cf-v2-*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: false
          draft: false
          prerelease: false
